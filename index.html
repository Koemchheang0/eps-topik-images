<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>រៀន EPS-TOPIK តាមរូបភាព</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{ --blue:#1d3f8a; --blue2:#2b57b8; --red:#c0271e; --green:#1e9e4a; --gray:#eef1f7; }
  body { margin:0; font-family:'Noto Sans Khmer','Khmer OS',system-ui,'Segoe UI',sans-serif;
         background:#f4f6fb; color:#222; }
  header { background:linear-gradient(135deg,var(--blue),var(--blue2)); color:#fff; padding:14px 16px; }
  header h1 { margin:0; font-size:19px; }
  header .sub { font-size:12px; opacity:.85; margin-top:2px; }
  .toolbar { position:sticky; top:0; z-index:30; background:#fff; border-bottom:1px solid #dde3ef;
             padding:6px 8px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  select { font-family:inherit; font-size:11px; padding:3px 5px; border:1px solid #c4cde0; border-radius:7px;
           background:#fff; max-width:44vw; }
  .seg { display:inline-flex; border:1px solid var(--blue); border-radius:7px; overflow:hidden; }
  .seg button { border:none; background:#fff; color:var(--blue); font-family:inherit; font-size:10px;
                padding:2px 6px; cursor:pointer; }
  #grpSeg button { font-size:10px; padding:2px 5px; }
  .seg button.on { background:var(--blue); color:#fff; }
  .tinybtn { width:26px; height:26px; border-radius:7px; border:1px solid var(--blue); background:#fff;
             color:var(--blue); font-size:13px; cursor:pointer; display:inline-flex; align-items:center;
             justify-content:center; padding:0; }
  .tinybtn small{ font-size:9px; }
  .modelabel{ font-size:11px; color:#555; }
  .hint { display:none; }

  /* Learn grid */
  #grid { padding:4px 6px 10px; }
  .grouphead { font-size:15px; font-weight:700; color:var(--blue); background:#eaf0ff;
               border-left:4px solid var(--blue); border-radius:8px; padding:7px 12px; margin:12px 0 8px; }
  .gridwrap { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; }
  @media(max-width:1100px){ .gridwrap{ grid-template-columns:repeat(6,1fr);} }
  @media(max-width:820px){ .gridwrap{ grid-template-columns:repeat(4,1fr);} }
  @media(max-width:560px){ .gridwrap{ grid-template-columns:repeat(3,1fr);} }
  @media(max-width:380px){ .gridwrap{ grid-template-columns:repeat(2,1fr);} }
  .card { background:#fff; border:1px solid #e0e6f2; border-radius:14px; overflow:hidden; cursor:pointer;
          box-shadow:0 1px 3px rgba(20,40,90,.06); position:relative; user-select:none; }
  .card .imgwrap { width:100%; aspect-ratio:1/1; background:#fafbff; display:flex; align-items:center; justify-content:center; }
  .card img { width:100%; height:100%; object-fit:contain; display:block; }
  .card .txt { padding:6px 5px 9px; text-align:center; }
  .card .ko { font-size:22px; font-weight:700; color:#111; line-height:1.2; word-break:break-word; }
  .card .km { font-size:19px; color:var(--red); margin-top:2px; line-height:1.25; word-break:break-word; }
  /* hidden parts (tap each part to hide only that part) */
  .card .imgwrap, .card .ko, .card .km { cursor:pointer; }
  .card.hide-img .imgwrap{ visibility:hidden; }
  .card.hide-img .imgwrap::after{ content:"🖼️"; visibility:visible; font-size:34px; opacity:.25; }
  .card.hide-txt .txt{ visibility:hidden; }
  .card.hide-txt .txt::after{ content:"？"; visibility:visible; color:#aaa; font-weight:700; }
  .card.hide-ko .ko{ visibility:hidden; position:relative; }
  .card.hide-ko .ko::after{ content:"？"; visibility:visible; position:absolute; left:0; right:0; top:0; color:#bbb; }
  .card.hide-km .km{ visibility:hidden; position:relative; }
  .card.hide-km .km::after{ content:"？"; visibility:visible; position:absolute; left:0; right:0; top:0; color:#ddb0b0; }
  /* fully covered (flashcard self-test) */
  .card.covered .imgwrap, .card.covered .txt{ visibility:hidden; }
  .card.covered::after{ content:"？"; position:absolute; inset:0; display:flex; align-items:center;
     justify-content:center; font-size:54px; color:#c8d1e6; background:repeating-linear-gradient(45deg,#f4f7ff,#f4f7ff 10px,#eaf0ff 10px,#eaf0ff 20px); }

  /* Match game */
  #match { padding:12px; }
  .mrow { display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; }
  .mcol { flex:1; min-width:260px; }
  .mcol h3 { font-size:14px; color:#555; margin:6px 4px; }
  .slot { display:flex; align-items:center; gap:10px; background:#fff; border:2px dashed #c4cde0;
          border-radius:12px; padding:8px; margin-bottom:10px; min-height:78px; }
  .slot.filled { border-style:solid; border-color:var(--green); background:#eefaf1; }
  .slot .simg { width:64px; height:64px; flex:0 0 64px; background:#fafbff; border-radius:8px; overflow:hidden;
                display:flex;align-items:center;justify-content:center; }
  .slot .simg img{ width:100%;height:100%;object-fit:contain; }
  .slot .dropzone { flex:1; min-height:44px; border-radius:8px; display:flex; flex-direction:column;
                    align-items:center; justify-content:center; gap:2px; }
  .slot .mko { font-size:23px; font-weight:700; color:#111; line-height:1.2; word-break:break-word; }
  .slot .mkm { font-size:18px; color:var(--red); line-height:1.25; word-break:break-word; }
  .bank { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .tile { background:var(--blue); color:#fff; border-radius:10px; padding:6px; font-size:15px;
          cursor:grab; touch-action:none; box-shadow:0 2px 5px rgba(20,40,90,.2); }
  .tile.used { visibility:hidden; }
  .tile.dragging { opacity:.4; }
  #floaty { position:fixed; z-index:999; pointer-events:none; background:var(--blue); color:#fff;
            border-radius:10px; padding:10px 14px; font-size:15px; box-shadow:0 6px 16px rgba(0,0,0,.3);
            display:none; }
  .matchbar { display:flex; gap:10px; align-items:center; margin:6px 4px 12px; flex-wrap:wrap; }
  .matchbar .prog{ font-size:14px; color:#333; }
  .btn { background:var(--blue); color:#fff; border:none; border-radius:10px; padding:9px 16px;
         font-family:inherit; font-size:14px; cursor:pointer; }
  .btn.ghost{ background:#fff; color:var(--blue); border:1px solid var(--blue); }
  .done { text-align:center; padding:20px; font-size:18px; color:var(--green); font-weight:700; }
  .hidden{ display:none !important; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  #authGate{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#1d3f8a,#2b57b8);
    display:flex;align-items:center;justify-content:center;padding:16px;
    font-family:'Noto Sans Khmer','Khmer OS',system-ui,sans-serif;}
  #authGate .card{background:#fff;border-radius:16px;max-width:380px;width:100%;
    padding:26px 22px;box-shadow:0 18px 50px rgba(0,0,0,.3);text-align:center;}
  #authGate h2{margin:6px 0 2px;color:#1d3f8a;font-size:20px;}
  #authGate .s{color:#667;font-size:13px;margin-bottom:16px;}
  #authGate input{width:100%;padding:12px 13px;margin:7px 0;border:1.5px solid #cdd6e6;
    border-radius:10px;font-size:15px;font-family:inherit;}
  #authGate input:focus{outline:none;border-color:#2b57b8;}
  #authGate button{width:100%;padding:12px;margin-top:10px;border:0;border-radius:10px;
    background:#1d3f8a;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
  #authGate button:disabled{opacity:.6;cursor:default;}
  #authGate .msg{min-height:20px;margin-top:12px;font-size:13.5px;color:#c0271e;line-height:1.5;}
  #authGate .ok{color:#1e9e4a;}
  #authTop{position:fixed;top:0;right:0;z-index:9999;padding:6px 10px;}
  #authTop button{font-size:11px;padding:4px 9px;border:1px solid #cdd6e6;border-radius:8px;
    background:#fff;color:#1d3f8a;cursor:pointer;}
  /* copy/screenshot deterrents */
  body{ -webkit-user-select:none; -moz-user-select:none; user-select:none; }
  #authGate input{ -webkit-user-select:text; user-select:text; }
  img{ -webkit-user-drag:none; -khtml-user-drag:none; -moz-user-drag:none; user-drag:none; }
</style>
<script>
(function(){
  function block(e){ e.preventDefault(); return false; }
  document.addEventListener('contextmenu', block);
  document.addEventListener('dragstart', block);
  document.addEventListener('copy', block);
  document.addEventListener('cut', block);
  document.addEventListener('keydown', function(e){
    var k=(e.key||'').toLowerCase();
    if(e.key==='F12') return block(e);
    if((e.ctrlKey||e.metaKey)&&['s','p','u'].indexOf(k)>-1) return block(e);
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','j','c'].indexOf(k)>-1) return block(e);
  });
})();
</script>
</head>

<div id="authGate">
  <div class="card">
    <h2>មជ្ឈមណ្ឌលអន្តរជាតិសេអ៊ូល</h2>
    <div class="s">រៀន EPS-TOPIK · សូមចូលគណនី</div>
    <input id="agEmail" type="email" placeholder="អ៊ីម៉ែល" autocomplete="username">
    <input id="agPass" type="password" placeholder="ពាក្យសម្ងាត់" autocomplete="current-password">
    <button id="agBtn">ចូល</button>
    <div class="msg" id="agMsg"></div>

</div>
<div id="authTop" style="display:none"><button id="agOut">ចាកចេញ</button></div>

<header>
  <h1>មជ្ឈមណ្ឌលអន្តរជាតិសេអ៊ូល</h1>
  <div class="sub">រៀបរៀងបង្កើតដោយលោកគ្រូ ឆឹងគឺម ឈាង</div>
</header>

<div class="toolbar">

  <span class="seg">
    <button id="mLearn" class="on">រៀន</button>
    <button id="mMatch">ផ្គូផ្គង</button>
  </span>
  <span class="seg" id="grpSeg"></span>
  <span id="learnCtrls" style="display:inline-flex;gap:8px;align-items:center;">
    <button class="tinybtn" id="toggleBtn" title="ប្តូររបៀបបង្ហាញ"><span id="toggleIcon">⇄</span></button>
    <span class="modelabel" id="modeLabel">ទាំងអស់</span>
  </span>
</div>
<div class="hint" id="hint"></div>

<div id="grid"></div>
<div id="match" class="hidden"></div>
<div id="floaty"></div>

// ---------- state ----------
let curLesson = 0;          // index into DATA
let mode = 'learn';         // learn | match
let disp = 'both';          // both | img | txt
let grp = '0';              // 0 | 1 | all  (វាក្យស័ព្ទ ១ = ថ្ងៃទី១, វាក្យស័ព្ទ ២ = ថ្ងៃទី២). ចាប់ផ្ដើមបង្ហាញតែវាក្យស័ព្ទ១
const DISP_LABEL = { both:'ទាំងអស់ (ចុចដើម្បីបាំង)', img:'រូបតែប៉ុណ្ណោះ (ចុចបើកអក្សរ)', txt:'អក្សរតែប៉ុណ្ណោះ (ចុចបើករូប)' };

const $ = s => document.querySelector(s);
const grid = $('#grid'), matchEl = $('#match');

// ---------- lesson selector ----------
const sel = $('#lessonSel');
DATA.forEach((l,i)=>{
  const o=document.createElement('option');
  o.value=i; o.textContent=`មេរៀន ${i+1}: ${l.km||''} (${l.ko||''})`;
  sel.appendChild(o);
});
sel.addEventListener('change', ()=>{ curLesson=+sel.value; buildGrpButtons(); resetToggle(); render(); });

// ---------- group (day) buttons ----------
const KH='០១២៣៤៥៦៧៨៩';
function kh(n){ return String(n).replace(/[0-9]/g,d=>KH[+d]); }
function dayStarts(){ const d=DATA[curLesson].days; return (d&&d.length)?d:[0]; }
function dayCount(){ return dayStarts().length; }
function dayLabel(i){ return 'ថ្ងៃ '+kh(i+1); }
function buildGrpButtons(){
  const seg=$('#grpSeg'); seg.innerHTML='';
  const n=dayCount();
  if(grp!=='all' && +grp>=n) grp='0';
  for(let i=0;i<n;i++){
    const b=document.createElement('button'); b.dataset.g=String(i); b.textContent=dayLabel(i);
    seg.appendChild(b);
  }
  const ba=document.createElement('button'); ba.dataset.g='all'; ba.textContent='ទាំងអស់';
  seg.appendChild(ba);
  seg.querySelectorAll('button').forEach(b=>{
    b.classList.toggle('on', b.dataset.g===grp);
    b.addEventListener('click', ()=>{
      grp=b.dataset.g;
      seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
      resetToggle(); render();
    });
  });
}

// ---------- mode buttons ----------
$('#mLearn').addEventListener('click', ()=>setMode('learn'));
$('#mMatch').addEventListener('click', ()=>setMode('match'));
function setMode(m){
  mode=m;
  $('#mLearn').classList.toggle('on', m==='learn');
  $('#mMatch').classList.toggle('on', m==='match');
  $('#learnCtrls').style.display = m==='learn' ? 'inline-flex':'none';
  grid.classList.toggle('hidden', m!=='learn');
  matchEl.classList.toggle('hidden', m!=='match');
  render();
}

// ---------- display toggle (9-ក្លាយវ័ត្តា) ----------
// ចុច 1: រូបតែប៉ុណ្ណោះ · 2,3,4: ច្របល់រូប
// ចុច 5: អក្សរកូរ៉េតែប៉ុណ្ណោះ · 6,7,8: ច្របល់អក្សរ
// ចុច 9: ត្រឡប់ធម្មតា (រូប+អក្សរ)
let tphase = 0, shuffleView = false;
function updateToggleLabel(){
  let icon='⇄', lbl='ទាំងអស់';
  if(disp==='img'){ icon='🖼️'; lbl='រូបភាព'+(shuffleView?' (ច្របល់)':''); }
  else if(disp==='ko'){ icon='한'; lbl='អក្សរកូរ៉េ'+(shuffleView?' (ច្របល់)':''); }
  $('#toggleIcon').textContent = icon;
  $('#modeLabel').textContent = lbl;
}
function resetToggle(){ tphase=0; disp='both'; shuffleView=false; updateToggleLabel(); }
$('#toggleBtn').addEventListener('click', ()=>{
  tphase++;
  if(tphase===9){ disp='both'; shuffleView=false; tphase=0; }
  else if(tphase<=4){ disp='img'; shuffleView = tphase>=2; }
  else { disp='ko'; shuffleView = tphase>=6; }
  updateToggleLabel();
  renderLearn();
});

function allWords(){ return DATA[curLesson].words.filter(w=>w.img); }
// split a lesson into teaching days following the book's 어휘 sections
function groupsOf(){ const w=allWords(), s=dayStarts(), out=[];
  for(let i=0;i<s.length;i++){ out.push(w.slice(s[i], i+1<s.length?s[i+1]:w.length)); }
  return out; }
// words for current group selection (used by match)
function curWords(){ const g=groupsOf(); return grp==='all' ? allWords() : (g[+grp]||[]); }

// ---------- LEARN ----------
function makeCard(w){
  const c=document.createElement('div');
  c.className='card';
  if(disp==='img') c.classList.add('hide-txt');
  else if(disp==='ko'){ c.classList.add('hide-img'); c.classList.add('hide-km'); }
  else if(disp==='txt') c.classList.add('hide-img');
  c.innerHTML = `<div class="imgwrap"><img loading="lazy" src="${w.img}" alt=""></div>
                 <div class="txt"><div class="ko">${w.k}</div><div class="km">${w.m||''}</div></div>`;
  const imgwrap=c.querySelector('.imgwrap'), ko=c.querySelector('.ko'), km=c.querySelector('.km');
  // tap each part independently to hide/show only that part
  imgwrap.addEventListener('click', e=>{ e.stopPropagation();
    if(disp==='txt') c.classList.toggle('hide-img');   // txt-only: reveal/hide the image
    else c.classList.toggle('hide-img'); });
  ko.addEventListener('click', e=>{ e.stopPropagation();
    if(disp==='img') c.classList.toggle('hide-txt');   // img-only: reveal/hide the text block
    else c.classList.toggle('hide-ko'); });
  km.addEventListener('click', e=>{ e.stopPropagation();
    if(disp==='img') c.classList.toggle('hide-txt');
    else c.classList.toggle('hide-km'); });
  return c;
}
function addGroupGrid(words){
  const g=document.createElement('div'); g.className='gridwrap';
  const list = shuffleView ? shuffle(words) : words;
  list.forEach(w=> g.appendChild(makeCard(w)));
  grid.appendChild(g);
}
function renderLearn(){
  $('#hint').textContent = DISP_LABEL[disp];
  grid.innerHTML='';
  const g=groupsOf();
  if(grp==='all'){
    g.forEach((gw,i)=>{ if(!gw.length) return;
      const h=document.createElement('div'); h.className='grouphead'; h.textContent=dayLabel(i);
      grid.appendChild(h); addGroupGrid(gw);
    });
  } else {
    const h=document.createElement('div'); h.className='grouphead'; h.textContent=dayLabel(+grp);
    grid.appendChild(h); addGroupGrid(g[+grp]||[]);
  }
}

// ---------- MATCH GAME ----------
let matched=0, roundItems=[];
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function renderMatch(){
  $('#hint').textContent = 'អូសរូបភាព ដាក់លើប្រអប់អក្សរឲ្យត្រូវគ្នា';
  const words=curWords();
  roundItems = words;                         // បង្ហាញទាំងអស់ក្នុងមុយអេក្រង់
  matched=0;
  const targets = words;                      // fixed order (text slots)
  const imgs = shuffle(words);                // shuffled images to drag
  const grpTxt = grp==='all' ? 'ទាំងអស់' : dayLabel(+grp);
  matchEl.innerHTML = `
    <div class="matchbar">
      <span class="prog">មេរៀន ${curLesson+1} · ${grpTxt} · ${words.length} ពាក្យ</span>
      <button class="btn ghost" id="reshuffle">ច្របល់ឡើងវិញ</button>
    </div>
    <div class="mrow">
      <div class="mcol"><div id="slots"></div></div>
      <div class="mcol"><div class="bank" id="bank"></div></div>
    </div>`;
  const slots=$('#slots'), bank=$('#bank');
  targets.forEach(w=>{
    const s=document.createElement('div');
    s.className='slot'; s.dataset.k=w.k;
    s.innerHTML=`<div class="dropzone"><span class="mko">${w.k}</span><span class="mkm">${w.m||''}</span></div>`;
    slots.appendChild(s);
  });
  imgs.forEach(w=>{
    const t=document.createElement('div');
    t.className='tile'; t.dataset.k=w.k;
    t.innerHTML=`<img src="${w.img}" style="width:100%;aspect-ratio:1/1;object-fit:contain;display:block;border-radius:6px;background:#fff" alt="">`;
    attachDrag(t, w);
    bank.appendChild(t);
  });
  $('#reshuffle').addEventListener('click', renderMatch);
}

// pointer-based drag (mouse + touch)
let dragTile=null, dragW=null;
const floaty=$('#floaty');
function attachDrag(tile, w){
  tile.addEventListener('pointerdown', e=>{
    if(tile.classList.contains('used')) return;
    e.preventDefault();
    dragTile=tile; dragW=w;
    tile.classList.add('dragging');
    floaty.innerHTML = tile.innerHTML;
    floaty.style.display='block';
    moveFloaty(e);
  });
}
function moveFloaty(e){ floaty.style.left=(e.clientX-40)+'px'; floaty.style.top=(e.clientY-40)+'px'; }
window.addEventListener('pointermove', e=>{ if(dragTile){ e.preventDefault(); moveFloaty(e); } }, {passive:false});
window.addEventListener('pointerup', e=>{
  if(!dragTile) return;
  floaty.style.display='none';
  dragTile.classList.remove('dragging');
  const el=document.elementFromPoint(e.clientX, e.clientY);
  const slot=el && el.closest('.slot');
  if(slot && !slot.classList.contains('filled') && slot.dataset.k===dragW.k){
    slot.classList.add('filled');
    slot.querySelector('.dropzone').innerHTML =
      `<img src="${dragW.img}" style="width:44px;height:44px;object-fit:contain;margin-right:8px">${dragW.k} <span class="kmlabel">${dragW.m||''}</span>`;
    dragTile.classList.add('used');
    matched++;
    if(matched===roundItems.length) finishRound();
  }
  dragTile=null; dragW=null;
});

function finishRound(){
  const bar=document.createElement('div');
  bar.className='done';
  bar.innerHTML = `✔ ត្រឹមត្រូវទាំងអស់! ` +
    `<div style="margin-top:10px"><button class="btn" id="nextRound">ចាប់ផ្ដើមឡើងវិញ</button></div>`;
  matchEl.appendChild(bar);
  $('#nextRound').addEventListener('click', renderMatch);
}

// ---------- render dispatch ----------
function render(){ if(mode==='learn') renderLearn(); else renderMatch(); }
buildGrpButtons();
render();
</script>

(function(){

  var sb=window.supabase.createClient(SB_URL,SB_KEY);

  function say(t,ok){ msg.textContent=t; msg.className=ok?'msg ok':'msg'; }

  function deviceId(){
    var id=localStorage.getItem('eps_device_id');
    if(!id){ id=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():(Date.now()+'-'+Math.random().toString(16).slice(2)); localStorage.setItem('eps_device_id',id); }

  }
  function show(){ gate.style.display='none'; topbar.style.display='block'; document.body.style.overflow=''; }
  function hide(){ gate.style.display='flex'; topbar.style.display='none'; document.body.style.overflow='hidden'; }

  async function checkDevice(uid){
    var did=deviceId();
    var r=await sb.from('device_bindings').select('device_id').eq('user_id',uid).maybeSingle();
    if(r.error){ return {ok:false,reason:'connect'}; }
    if(!r.data){
      var ins=await sb.from('device_bindings').insert({user_id:uid,device_id:did,user_agent:navigator.userAgent});
      if(ins.error){ return {ok:false,reason:'bind'}; }
      return {ok:true};
    }
    if(r.data.device_id===did) return {ok:true};
    return {ok:false,reason:'other'};
  }

  async function afterAuth(session){
    if(!session){ hide(); return; }
    say('កំពុងពិនិត្យឧបករណ៍...',true);
    var res=await checkDevice(session.user.id);

    await sb.auth.signOut();
    hide();
    if(res.reason==='other') say('គណនីនេះបានចងភ្ជាប់ជាមួយឧបករណ៍ផ្សេងរួចហើយ។ សូមទាក់ទងលោកគ្រូ។');
    else if(res.reason==='connect') say('បញ្ហាតភ្ជាប់ server។ សូមព្យាយាមម្តងទៀត។');
    else say('មិនអាចចុះឈ្មោះឧបករណ៍បានទេ។ សូមទាក់ទងលោកគ្រូ។');
  }

  async function login(){
    var email=(document.getElementById('agEmail').value||'').trim();
    var pass=document.getElementById('agPass').value||'';
    if(!email||!pass){ say('សូមបញ្ចូលអ៊ីម៉ែល និងពាក្យសម្ងាត់។'); return; }
    btn.disabled=true; say('កំពុងចូល...',true);
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    btn.disabled=false;
    if(r.error){ say('អ៊ីម៉ែល ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវ។'); return; }
    afterAuth(r.data.session);
  }

  btn.addEventListener('click',login);
  document.getElementById('agPass').addEventListener('keydown',function(e){ if(e.key==='Enter') login(); });
  document.getElementById('agOut').addEventListener('click',async function(){ await sb.auth.signOut(); location.reload(); });

  hide();
  sb.auth.getSession().then(function(r){ afterAuth(r.data.session); });
})();
